name: monthly-update
on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force semver (e.g. 0.1.1)"
        required: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Fetch sources
        run: python -m build.build_sqlite --version ${{ github.event.inputs.force_version || '0.1.0' }} --output dist/jp-med-dict.sqlite
      - name: Test
        run: pytest -q
      - name: Manifest
        run: python -m build.manifest --sqlite dist/jp-med-dict.sqlite --zst dist/jp-med-dict.sqlite.zst --version ${{ github.event.inputs.force_version || '0.1.0' }} --output dist/manifest.json
      - name: Release
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.force_version || '0.1.0' }}
          files: |
            dist/*.sqlite.zst
            dist/manifest.json
